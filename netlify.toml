# base points the build at the app dir so Netlify detects @netlify/blobs in its
# package.json and provisions the Blobs runtime context for the functions.
# Building from the repo root does NOT do this, which yields
# MissingBlobsEnvironmentError at runtime (get-art/save-art/flags all 500).
[build]
  base = "apps/text-art-library"
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # EDITOR_PASSWORD is a low-value editor gate read only from process.env (never
  # hardcoded). Its short value collides with hex color codes across other apps
  # in this monorepo, so scanning for it produces only false positives.
  SECRETS_SCAN_OMIT_KEYS = "EDITOR_PASSWORD"

[functions]
  node_bundler = "esbuild"
