[build]
  command = "echo 'static site, no build needed'"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Always revalidate HTML so a new deploy reaches users immediately (the HTML
# references versioned ?v= assets, so it must never be served stale).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# PWA: never cache the service worker — must always check for updates so a new
# deploy can roll out a new SW without users getting stuck on the old one.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

# Manifest: small file, revalidate on each visit so app metadata stays fresh.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

# version.json drives the app's auto-update self-heal — it must NEVER be cached
# by the CDN or the browser, or a stale client couldn't detect a new deploy.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Content-Type = "application/json"
