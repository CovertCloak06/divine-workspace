name: Claude Auto-Fix on Bug Issue

# Fires when an issue is labeled `auto-fix`. Triggered manually by Cameron from
# his phone via the GitHub mobile app after reviewing a bug-feedback issue
# created by the in-app form (apps/text-art-library/netlify/functions/submit-bug.js).
#
# The action spawns a Claude Code session, hands it the issue context (which
# already includes the triage analysis, reporter description, and device
# context), and Claude attempts a surgical fix + opens a draft PR referencing
# the issue. The PR auto-deploys via Netlify on merge, just like every other
# PR in this repo.

on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: auto-fix
          prompt: |
            You are picking up a bug report filed via the Frostline in-app
            feedback form. Read GitHub issue #${{ github.event.issue.number }}
            in this repo. The issue body has three sections:

            1. The reporter's verbatim description (in a blockquote)
            2. A "Triage" table with severity, area, summary, likely cause,
               and a suggested fix area — pre-generated by Claude Haiku 4.5
               at submission time
            3. A JSON "Reporter context" block with the user agent, viewport,
               app version, current screen, and any other metadata the form
               captured

            Your job:

            - Treat the triage as a strong hint, not a contract. Verify
              against the actual code before changing anything.
            - The Frostline app lives in `apps/text-art-library/`. Main files:
              `index.html` (markup + inline drawer CSS + module loading),
              `style.css` (everything else), `app.js` (all behavior),
              `palette-data.js` (character groups), `art.js` (curated art).
              Netlify Functions are in `netlify/functions/`.
            - Make the MINIMAL fix — no surrounding cleanup, no unrelated
              refactors, no "while I'm here" changes. A bug fix should not
              touch unrelated files.
            - Bump the cache-bust version (`?v=wosNN`) in `index.html` if you
              change CSS or JS, so existing PWA installs pick up the fix.
            - Open a DRAFT pull request targeting `master`, titled with the
              same format as previous commits: `fix(frostline): <one-line
              summary> (wosNN)`. Reference the issue in the PR body using
              `Fixes #${{ github.event.issue.number }}` so it auto-closes
              when merged.
            - Include a short Test Plan in the PR body — bullet points,
              steps to verify the fix works and didn't regress adjacent
              behavior.
            - If you cannot reproduce or cannot determine a confident fix
              within a reasonable scope, post a comment on the issue
              explaining what you tried and what you'd need to proceed —
              don't open a half-baked PR.
